<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informativo de Estoque — VX Case</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root[data-theme="light"]{
    --bg: #F3F1EA;
    --surface: #FFFFFF;
    --surface-2: #FAF8F3;
    --text: #1B1D1A;
    --text-dim: #6B6A63;
    --border: #DEDAD0;
    --baixa: #B3690F;
    --baixa-bg: #FBEEDD;
    --zerado: #A62A22;
    --zerado-bg: #FBE7E4;
    --ok: #2E6B49;
    --ok-bg: #E4F0E9;
    --accent: #1B1D1A;
    --danger: #A62A22;
    --shadow: 0 1px 2px rgba(20,20,15,0.06), 0 4px 14px rgba(20,20,15,0.05);
  }
  :root[data-theme="dark"]{
    --bg: #15171A;
    --surface: #1D2023;
    --surface-2: #21262A;
    --text: #EDEBE4;
    --text-dim: #97958C;
    --border: #2E3236;
    --baixa: #E3A24C;
    --baixa-bg: #332617;
    --zerado: #E56F65;
    --zerado-bg: #35201E;
    --ok: #5FBE8B;
    --ok-bg: #1B2B22;
    --accent: #EDEBE4;
    --danger: #E56F65;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease, color .2s ease;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 28px;
    border-bottom:1px solid var(--border);
    position:sticky;top:0;background:var(--bg);z-index:20;
  }
  header .brand{display:flex;align-items:baseline;gap:10px;}
  header .brand .tag{
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    letter-spacing:.08em;color:var(--text-dim);border:1px solid var(--border);
    padding:3px 8px;border-radius:4px;
  }
  header h1{font-size:17px;font-weight:700;margin:0;letter-spacing:-0.01em;}

  .theme-toggle{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    border:1px solid var(--border);background:var(--surface);
    padding:7px 12px;border-radius:20px;font-size:13px;font-weight:500;
    color:var(--text-dim);
  }
  .theme-toggle:hover{color:var(--text);}

  main{
    max-width:1180px;margin:0 auto;padding:28px;
    display:grid;grid-template-columns:360px 1fr;gap:24px;
  }
  @media (max-width:900px){ main{grid-template-columns:1fr;} }

  .card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:20px;box-shadow:var(--shadow);
  }
  .card + .card{margin-top:20px;}
  .card h2{
    font-size:12px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--text-dim);margin:0 0 16px;font-weight:700;
  }

  label{display:block;font-size:12.5px;font-weight:600;margin:14px 0 6px;color:var(--text-dim);}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=date], select, textarea{
    width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface-2);color:var(--text);font-family:inherit;font-size:14px;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--text-dim);outline-offset:1px;}
  textarea{resize:vertical;min-height:52px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .switch-row{display:flex;align-items:center;justify-content:space-between;
    margin-top:14px;padding:10px 12px;background:var(--surface-2);border-radius:8px;border:1px solid var(--border);}
  .switch-row span{font-size:13.5px;font-weight:600;}
  .switch{position:relative;width:40px;height:22px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.15s;}
  .slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:var(--surface);border-radius:50%;transition:.15s;}
  input:checked + .slider{background:var(--ok);}
  input:checked + .slider:before{transform:translateX(18px);}

  .conditional{display:none;}
  .conditional.show{display:block;}

  button{
    font-family:inherit;font-weight:700;font-size:13.5px;border:none;
    border-radius:8px;padding:11px 16px;cursor:pointer;transition:.12s ease;
  }
  .btn-primary{background:var(--text);color:var(--bg);width:100%;margin-top:18px;}
  .btn-primary:hover{opacity:.88;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-dim);}
  .btn-danger-ghost{background:transparent;color:var(--danger);border:1px solid var(--zerado-bg);}
  .btn-danger-ghost:hover{background:var(--zerado-bg);}

  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .list-header h2{margin:0;}
  .select-all{font-size:12px;color:var(--text-dim);cursor:pointer;font-weight:600;}
  .select-all:hover{color:var(--text);}

  .product{
    border:1px solid var(--border);border-radius:10px;padding:14px 16px;
    margin-bottom:10px;background:var(--surface-2);
    display:flex;gap:12px;align-items:flex-start;
  }
  .product input[type=checkbox]{margin-top:3px;width:16px;height:16px;accent-color:var(--text);}
  .product .body{flex:1;min-width:0;}
  .product .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .product .nome{font-weight:700;font-size:14.5px;}
  .product .codigo{font-size:12.5px;color:var(--text-dim);}
  .badge{
    font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
    padding:3px 8px;border-radius:5px;
  }
  .badge.baixa{background:var(--baixa-bg);color:var(--baixa);}
  .badge.zerado{background:var(--zerado-bg);color:var(--zerado);}
  .badge.pre-ok{background:var(--ok-bg);color:var(--ok);}
  .badge.pre-no{background:var(--surface);color:var(--text-dim);border:1px solid var(--border);}
  .meta-line{font-size:12.5px;color:var(--text-dim);margin-top:4px;line-height:1.5;}
  .meta-line b{color:var(--text);font-weight:600;}
  .product .actions{display:flex;gap:6px;flex-shrink:0;}
  .product .actions button{padding:6px 10px;font-size:12px;}

  .empty{
    text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13.5px;
  }

  .stores{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px;background:var(--surface-2);}
  .store-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;font-size:13px;}
  .store-item:hover{background:var(--surface);}
  .store-item input{accent-color:var(--text);}

  .preview{
    background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;
    white-space:pre-wrap;line-height:1.6;color:var(--text);min-height:60px;
  }
  .preview:empty:before{content:"Selecione produtos e lojas pra ver o preview.";color:var(--text-dim);font-family:'Inter',sans-serif;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);padding:12px 20px;border-radius:8px;
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;
    transition:.2s ease;pointer-events:none;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--danger);color:#fff;}

  .send-summary{font-size:12.5px;color:var(--text-dim);margin-top:10px;}
  .send-summary b{color:var(--text);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Informativo de Estoque</h1>
    <span class="tag">VX CASE</span>
  </div>
  <div class="theme-toggle" id="themeToggle">
    <span id="themeIcon">🌙</span>
    <span id="themeLabel">Escuro</span>
  </div>
</header>

<main>
  <!-- COLUNA ESQUERDA: CADASTRO -->
  <div>
    <div class="card">
      <h2>Cadastrar produto</h2>

      <label>Código</label>
      <input type="text" id="fCodigo" placeholder="Ex: 12345">

      <label>Nome do produto</label>
      <input type="text" id="fNome" placeholder="Ex: Camiseta Básica P">

      <label>Situação</label>
      <select id="fSituacao">
        <option value="baixa">Baixo estoque</option>
        <option value="zerado">Zerado</option>
      </select>

      <div class="switch-row">
        <span>Tem previsão de chegada</span>
        <label class="switch">
          <input type="checkbox" id="fTemPrevisao">
          <span class="slider"></span>
        </label>
      </div>
      <div class="conditional" id="previsaoBox">
        <label>Data prevista</label>
        <input type="date" id="fDataPrevisao">
      </div>

      <div class="switch-row">
        <span>Disponível pra pré-order</span>
        <label class="switch">
          <input type="checkbox" id="fPreOrder">
          <span class="slider"></span>
        </label>
      </div>

      <div class="switch-row">
        <span>Tem código substituto</span>
        <label class="switch">
          <input type="checkbox" id="fTemSubstituto">
          <span class="slider"></span>
        </label>
      </div>
      <div class="conditional" id="substitutoBox">
        <label>Código substituto</label>
        <input type="text" id="fCodigoSubstituto" placeholder="Ex: 12399">
      </div>

      <label>Observação (opcional)</label>
      <textarea id="fObservacao" placeholder="Detalhe adicional..."></textarea>

      <button class="btn-primary" id="btnSalvar">Adicionar à lista</button>
    </div>
  </div>

  <!-- COLUNA DIREITA: LISTA + ENVIO -->
  <div>
    <div class="card">
      <div class="list-header">
        <h2>Produtos ativos</h2>
        <span class="select-all" id="selectAllProdutos">selecionar todos</span>
      </div>
      <div id="listaProdutos"></div>
    </div>

    <div class="card">
      <div class="list-header">
        <h2>Enviar informativo</h2>
      </div>

      <label>Lojas destino</label>
      <div class="list-header" style="margin-bottom:6px;">
        <span></span>
        <span class="select-all" id="selectAllLojas">selecionar todas</span>
      </div>
      <div class="stores" id="listaLojas"></div>

      <label>Preview da mensagem</label>
      <div class="preview" id="preview"></div>

      <button class="btn-primary" id="btnEnviar" disabled>Enviar para lojas selecionadas</button>
      <div class="send-summary" id="sendSummary"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
/* ========= CONFIG ========= */
const SUPABASE_URL = "https://fevhyllvfhvzzfhwyjuk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE";

const EVOLUTION_URL = "https://evolution.vxcase.com.br";
const EVOLUTION_INSTANCE = "FARDAMENTOS";
const EVOLUTION_APIKEY = "B168AAC08A5E-467D-A691-54F427D6D4E8";

const LOJAS = [
  ["120363026668592251@g.us","BH BOULEVARD LOJA 1049"],
  ["120363183913500022@g.us","BOTAFOGO LOJA 126"],
  ["557199847870-1513727862@g.us","FEIRA DE SANTANA LOJA 213"],
  ["557199847870-1611604025@g.us","GOIÂNIA SHOPPING LOJA 217"],
  ["120363046934340487@g.us","BH DEL REY LOJA SDR 3025"],
  ["120363030096815008@g.us","TIJUCA QUIOSQUE 105"],
  ["120363146598665342@g.us","FORTALEZA RIOMAR LOJA 1173"],
  ["120363082143579749@g.us","BH SAVASSI LOJA 103"],
  ["557199847870-1524681160@g.us","VITORIA DA CONQUISTA LOJA 1017"],
  ["557199847870-1508792377@g.us","FORTALEZA IGUATEMI LOJA 617"],
  ["557199847870-1513634378@g.us","MANAUS MANAUARA LOJA 90"],
  ["557199847870-1525840710@g.us","NITEROI LOJA SPN00313"],
  ["557199847870-1543280119@g.us","MACEIÓ SHOPPING LOJA 308A"],
  ["558182887000-1473531782@g.us","RIO DE JANEIRO FASHION LOJA 115"],
  ["559192442055-1496446314@g.us","BELÉM BOULEVARD LOJA 459"],
  ["557199847870-1513634228@g.us","NATAL SHOPPING LOJA 378"],
  ["120363276112192310@g.us","NATAL MIDWAY LOJA 254"],
  ["558282359991-1493325321@g.us","MACEIÓ PARQUE QUIOSQUE 04"],
  ["120363276768615126@g.us","SÃO PAULO TAMBORÉ STB0027"],
  ["557199847870-1513634519@g.us","BH SHOPPING LOJA 08"],
  ["557199847870-1515418514@g.us","VILA VELHA LOJA 1031"],
  ["557199847870-1513633579@g.us","GOIÂNIA FLAMBOYANT LOJA P438"],
  ["557199847870-1513634147@g.us","ARACAJU RIOMAR LOJA 143A"],
  ["557199847870-1530470534@g.us","RECIFE RIOMAR LOJA 1061"],
  ["558182154402-1417545211@g.us","SHOPPING RECIFE LOJA PC145"],
  ["120363276816324109@g.us","BELÉM PARQUE QUIOSQUE 07"],
  ["120363270105189170@g.us","BH DIAMONDMALL LOJA BG57"],
  ["120363337254500707@g.us","RIO DE JANEIRO DESIGN QUIOSQUE 3F"],
  ["120363313739059909@g.us","BRASÍLIA LOJA 293"],
  ["120363329742982545@g.us","MANAUS AMAZONAS QUIOSQUE A39"],
  ["120363423144923019@g.us","CAMPINAS LOJA 1229"],
  ["120363420094103882@g.us","RIO DE JANEIRO SUL LOJA 401"],
];

/* ========= INIT ========= */
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TABLE = "produtos_status";

let produtos = [];
let selectedProdutos = new Set();
let selectedLojas = new Set();

/* ========= TEMA ========= */
const root = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const themeIcon = document.getElementById("themeIcon");
const themeLabel = document.getElementById("themeLabel");

function applyTheme(t){
  root.setAttribute("data-theme", t);
  themeIcon.textContent = t === "light" ? "🌙" : "☀️";
  themeLabel.textContent = t === "light" ? "Escuro" : "Claro";
  localStorage.setItem("estoque_theme", t);
}
applyTheme(localStorage.getItem("estoque_theme") || "light");
themeToggle.onclick = () => applyTheme(root.getAttribute("data-theme") === "light" ? "dark" : "light");

/* ========= TOAST ========= */
function toast(msg, isError){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => el.classList.remove("show"), 3200);
}

/* ========= FORM CONDICIONAIS ========= */
document.getElementById("fTemPrevisao").onchange = e =>
  document.getElementById("previsaoBox").classList.toggle("show", e.target.checked);
document.getElementById("fTemSubstituto").onchange = e =>
  document.getElementById("substitutoBox").classList.toggle("show", e.target.checked);

/* ========= SALVAR PRODUTO ========= */
document.getElementById("btnSalvar").onclick = async () => {
  const codigo = document.getElementById("fCodigo").value.trim();
  const nome = document.getElementById("fNome").value.trim();
  if(!codigo || !nome){ toast("Preenche código e nome.", true); return; }

  const temPrevisao = document.getElementById("fTemPrevisao").checked;
  const temSubstituto = document.getElementById("fTemSubstituto").checked;

  const payload = {
    codigo, nome,
    situacao: document.getElementById("fSituacao").value,
    tem_previsao: temPrevisao,
    data_previsao: temPrevisao ? (document.getElementById("fDataPrevisao").value || null) : null,
    pre_order: document.getElementById("fPreOrder").checked,
    codigo_substituto: temSubstituto ? document.getElementById("fCodigoSubstituto").value.trim() || null : null,
    observacao: document.getElementById("fObservacao").value.trim() || null,
    resolvido: false
  };

  const btn = document.getElementById("btnSalvar");
  btn.disabled = true; btn.textContent = "Salvando...";
  const { error } = await supa.from(TABLE).insert(payload);
  btn.disabled = false; btn.textContent = "Adicionar à lista";

  if(error){ toast("Erro ao salvar: " + error.message, true); return; }

  toast("Produto adicionado.");
  ["fCodigo","fNome","fCodigoSubstituto","fObservacao","fDataPrevisao"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("fSituacao").value = "baixa";
  document.getElementById("fTemPrevisao").checked = false;
  document.getElementById("fPreOrder").checked = false;
  document.getElementById("fTemSubstituto").checked = false;
  document.getElementById("previsaoBox").classList.remove("show");
  document.getElementById("substitutoBox").classList.remove("show");
};

/* ========= LISTA DE PRODUTOS ========= */
function fmtData(d){
  if(!d) return null;
  const [y,m,day] = d.split("-");
  return `${day}/${m}/${y}`;
}

function renderProdutos(){
  const wrap = document.getElementById("listaProdutos");
  const ativos = produtos.filter(p => !p.resolvido);

  if(ativos.length === 0){
    wrap.innerHTML = `<div class="empty">Nenhum produto em baixa ou zerado no momento.</div>`;
    updatePreview();
    return;
  }

  wrap.innerHTML = ativos.map(p => {
    const checked = selectedProdutos.has(p.id) ? "checked" : "";
    const sitLabel = p.situacao === "zerado" ? "Zerado" : "Baixo estoque";
    const previsaoTxt = p.tem_previsao && p.data_previsao ? fmtData(p.data_previsao) : "Sem reposição";
    return `
    <div class="product">
      <input type="checkbox" data-id="${p.id}" class="chkProduto" ${checked}>
      <div class="body">
        <div class="top">
          <span class="nome">${escapeHtml(p.nome)}</span>
          <span class="codigo mono">#${escapeHtml(p.codigo)}</span>
          <span class="badge ${p.situacao}">${sitLabel}</span>
          <span class="badge ${p.pre_order ? "pre-ok" : "pre-no"}">${p.pre_order ? "Pré-order OK" : "Sem pré-order"}</span>
        </div>
        <div class="meta-line"><b>Previsão:</b> ${previsaoTxt}</div>
        ${p.codigo_substituto ? `<div class="meta-line"><b>Substituto:</b> ${escapeHtml(p.codigo_substituto)}</div>` : ""}
        ${p.observacao ? `<div class="meta-line">${escapeHtml(p.observacao)}</div>` : ""}
      </div>
      <div class="actions">
        <button class="btn-ghost" data-resolve="${p.id}">Resolvido</button>
        <button class="btn-danger-ghost" data-delete="${p.id}">Excluir</button>
      </div>
    </div>`;
  }).join("");

  wrap.querySelectorAll(".chkProduto").forEach(chk => {
    chk.onchange = () => {
      chk.checked ? selectedProdutos.add(chk.dataset.id) : selectedProdutos.delete(chk.dataset.id);
      updatePreview();
    };
  });
  wrap.querySelectorAll("[data-resolve]").forEach(btn => {
    btn.onclick = async () => {
      const { error } = await supa.from(TABLE).update({ resolvido: true }).eq("id", btn.dataset.resolve);
      if(error) toast("Erro: " + error.message, true);
      else toast("Marcado como resolvido.");
    };
  });
  wrap.querySelectorAll("[data-delete]").forEach(btn => {
    btn.onclick = async () => {
      if(!confirm("Excluir esse produto da lista?")) return;
      const { error } = await supa.from(TABLE).delete().eq("id", btn.dataset.delete);
      if(error) toast("Erro: " + error.message, true);
      else toast("Excluído.");
    };
  });

  updatePreview();
}

document.getElementById("selectAllProdutos").onclick = () => {
  const ativos = produtos.filter(p => !p.resolvido);
  const allSelected = ativos.every(p => selectedProdutos.has(p.id));
  if(allSelected) selectedProdutos.clear();
  else ativos.forEach(p => selectedProdutos.add(p.id));
  renderProdutos();
};

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

/* ========= LISTA DE LOJAS ========= */
function renderLojas(){
  const wrap = document.getElementById("listaLojas");
  wrap.innerHTML = LOJAS.map(([jid, nome]) => `
    <label class="store-item">
      <input type="checkbox" class="chkLoja" data-jid="${jid}">
      <span>${escapeHtml(nome)}</span>
    </label>
  `).join("");

  wrap.querySelectorAll(".chkLoja").forEach(chk => {
    chk.onchange = () => {
      chk.checked ? selectedLojas.add(chk.dataset.jid) : selectedLojas.delete(chk.dataset.jid);
      updatePreview();
    };
  });
}
renderLojas();

document.getElementById("selectAllLojas").onclick = () => {
  const wrap = document.getElementById("listaLojas");
  const allSelected = LOJAS.every(([jid]) => selectedLojas.has(jid));
  wrap.querySelectorAll(".chkLoja").forEach(chk => {
    chk.checked = !allSelected;
    allSelected ? selectedLojas.delete(chk.dataset.jid) : selectedLojas.add(chk.dataset.jid);
  });
  updatePreview();
};

/* ========= MENSAGEM ========= */
function buildMessage(){
  const selecionados = produtos.filter(p => selectedProdutos.has(p.id));
  if(selecionados.length === 0) return "";

  let msg = "🔴 *ATUALIZAÇÃO DE ESTOQUE*\n\n";
  msg += selecionados.map(p => {
    const sit = p.situacao === "zerado" ? "ZERADO" : "BAIXO ESTOQUE";
    const previsao = p.tem_previsao && p.data_previsao ? fmtData(p.data_previsao) : "SEM REPOSIÇÃO";
    const preOrder = p.pre_order ? "Disponível" : "Indisponível";
    const substituto = p.codigo_substituto ? p.codigo_substituto : "Nenhum";
    let bloco = `📦 *Produto:* ${p.nome}\n`;
    bloco += `🔖 *Código:* ${p.codigo}\n`;
    bloco += `⚠️ *Situação:* ${sit}\n`;
    bloco += `📅 *Previsão:* ${previsao}\n`;
    bloco += `🔄 *Pré-order:* ${preOrder}\n`;
    bloco += `➡️ *Substituto:* ${substituto}`;
    if(p.observacao) bloco += `\n📝 ${p.observacao}`;
    return bloco;
  }).join("\n\n➖➖➖➖➖➖➖➖➖\n\n");

  return msg;
}

function updatePreview(){
  const msg = buildMessage();
  document.getElementById("preview").textContent = msg;
  const btn = document.getElementById("btnEnviar");
  btn.disabled = !(msg && selectedLojas.size > 0);
  document.getElementById("sendSummary").innerHTML = msg
    ? `<b>${selectedProdutos.size}</b> produto(s) · <b>${selectedLojas.size}</b> loja(s) selecionada(s)`
    : "";
}

/* ========= ENVIO ========= */
document.getElementById("btnEnviar").onclick = async () => {
  const msg = buildMessage();
  const jids = Array.from(selectedLojas);
  if(!msg || jids.length === 0) return;

  const btn = document.getElementById("btnEnviar");
  btn.disabled = true;
  let ok = 0, fail = 0;

  for(const jid of jids){
    btn.textContent = `Enviando... (${ok+fail+1}/${jids.length})`;
    try{
      const res = await fetch(`${EVOLUTION_URL}/message/sendText/${EVOLUTION_INSTANCE}`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": EVOLUTION_APIKEY },
        body: JSON.stringify({ number: jid, text: msg })
      });
      if(res.ok) ok++; else fail++;
    }catch(e){ fail++; }
    await new Promise(r => setTimeout(r, 350)); // evita flood
  }

  btn.textContent = "Enviar para lojas selecionadas";
  btn.disabled = false;
  toast(fail === 0 ? `Enviado para ${ok} loja(s).` : `${ok} enviado(s), ${fail} falharam.`, fail > 0);
};

/* ========= SUPABASE: LOAD + REALTIME ========= */
async function loadProdutos(){
  const { data, error } = await supa.from(TABLE).select("*").order("created_at", { ascending: false });
  if(error){ toast("Erro ao carregar: " + error.message, true); return; }
  produtos = data || [];
  renderProdutos();
}

supa
  .channel("produtos_status_changes")
  .on("postgres_changes", { event: "*", schema: "public", table: TABLE }, () => loadProdutos())
  .subscribe();

loadProdutos();
</script>
